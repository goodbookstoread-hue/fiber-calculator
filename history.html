<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiber Tracker - History</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial,sans-serif;max-width:600px;margin:40px auto;padding:20px;}
h1{color:#2d6a4f;}
.day-group{margin-bottom:24px;border:1px solid #ddd;border-radius:8px;padding:14px;}
.day-header{font-weight:bold;color:#2d6a4f;margin-bottom:8px;display:flex;justify-content:space-between;}
.food-item{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid #f0f0f0;font-size:14px;}
.day-total{font-weight:bold;margin-top:8px;text-align:right;color:#2d6a4f;}
.nav{margin-bottom:20px;}
.nav a{color:#2d6a4f;text-decoration:none;margin-right:16px;}
.empty{color:#888;text-align:center;margin-top:40px;}
</style>
</head>
<body>
<div class="nav"><a href="index.html">← Back to Tracker</a></div>
<h1 id="historyTitle">Your Fiber History</h1>
<div id="historyContainer"><p class="empty">Loading...</p></div>

<script>
var SB_URL = 'https:' + '//wytulhgmvaeqnkvvhzxq.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5dHVsaGdtdmFlcW5rdnZoenhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTA5MjgsImV4cCI6MjA5NzM2NjkyOH0.s-to8DfmqkZKDWU5hnNkJYiR-nZiBeX7-G-b2kWwKds';
var supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);

async function loadHistory(){
  var userResult = await supabaseClient.auth.getUser();
  if(!userResult.data.user){
    window.location.href = 'login.html';
    return;
  }
  var userId = userResult.data.user.id;

  var profileResult = await supabaseClient.from('profiles').select('full_name').eq('id', userId).single();
  var name = (profileResult.data && profileResult.data.full_name) || null;
  if(name){
    document.getElementById('historyTitle').textContent = name + "'s Fiber History";
  }

  var logsResult = await supabaseClient
    .from('food_logs')
    .select('food_description, fiber_grams, soluble_g, insoluble_g, logged_at')
    .eq('user_id', userId)
    .order('logged_at', { ascending: false });

  var container = document.getElementById('historyContainer');

  if(logsResult.error){
    container.innerHTML = '<p class="empty">Error loading history.</p>';
    return;
  }

  var logs = logsResult.data;
  if(!logs || logs.length === 0){
    container.innerHTML = '<p class="empty">No food logged yet. Go log some meals!</p>';
    return;
  }

  var grouped = {};
  logs.forEach(function(entry){
    var day = new Date(entry.logged_at).toLocaleDateString();
    if(!grouped[day]) grouped[day] = [];
    grouped[day].push(entry);
  });

  var html = '';
  Object.keys(grouped).forEach(function(day){
    var entries = grouped[day];
    var total = 0;
    var totalSoluble = 0;
    var totalInsoluble = 0;
    var itemsHtml = '';
    entries.forEach(function(e){
      var fiber = parseFloat(e.fiber_grams) || 0;
      var soluble = parseFloat(e.soluble_g) || 0;
      var insoluble = parseFloat(e.insoluble_g) || 0;
      total += fiber;
      totalSoluble += soluble;
      totalInsoluble += insoluble;
      var breakdownLine = (soluble > 0 || insoluble > 0)
        ? '<div style="font-size:11px;color:#999;">Soluble: ' + soluble.toFixed(1) + 'g &middot; Insoluble: ' + insoluble.toFixed(1) + 'g</div>'
        : '';
      itemsHtml += '<div class="food-item" style="flex-direction:column;align-items:flex-start;"><div style="display:flex;justify-content:space-between;width:100%;"><span>' + e.food_description + '</span><span>' + fiber.toFixed(1) + 'g</span></div>' + breakdownLine + '</div>';
    });
    html += '<div class="day-group"><div class="day-header"><span>' + day + '</span></div>' + itemsHtml +
      '<div class="day-total">Total: ' + total.toFixed(1) + 'g fiber</div>' +
      '<div style="text-align:right;font-size:12px;color:#888;">Soluble: ' + totalSoluble.toFixed(1) + 'g &middot; Insoluble: ' + totalInsoluble.toFixed(1) + 'g</div></div>';
  });

  container.innerHTML = html;
}

loadHistory();
</script>
</body>
</html>
