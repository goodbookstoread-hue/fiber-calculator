<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiber Tracker - Login</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:Arial,sans-serif;max-width:400px;margin:80px auto;padding:20px;}
h1{text-align:center;color:#2d6a4f;}
input{width:100%;padding:10px;margin:8px 0;border:1px solid #ccc;border-radius:6px;box-sizing:border-box;}
button{width:100%;padding:10px;margin-top:10px;background:#2d6a4f;color:white;border:none;border-radius:6px;cursor:pointer;font-size:16px;}
button:hover{background:#1b4332;}
.toggle{text-align:center;margin-top:15px;color:#555;cursor:pointer;text-decoration:underline;}
.message{text-align:center;margin-top:10px;color:#b91c1c;}
</style>
</head>
<body>
<h1>Fiber Tracker</h1>
<div id="formTitle" style="text-align:center;font-weight:bold;">Log In</div>
<input type="text" id="fullName" placeholder="Your Name" style="display:none;">
<input type="email" id="email" placeholder="Email">
<div style="position:relative;">
<input type="password" id="password" placeholder="Password" style="padding-right:40px;">
<span onclick="togglePassword()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:14px;color:#555;">👁️</span>
</div>
<button id="actionButton" onclick="handleAuth()">Log In</button>
<div class="toggle" onclick="toggleMode()">Don't have an account? Sign up</div>
<div style="text-align:center;font-size:12px;color:#888;margin-top:12px;">By signing up, you agree to our <a href="terms.html" style="color:#2d6a4f;">Terms of Service</a> and <a href="privacy.html" style="color:#2d6a4f;">Privacy Policy</a>.</div>
<div class="message" id="message"></div>
<script>
var SB_URL = 'https:' + '//wytulhgmvaeqnkvvhzxq.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind5dHVsaGdtdmFlcW5rdnZoenhxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTA5MjgsImV4cCI6MjA5NzM2NjkyOH0.s-to8DfmqkZKDWU5hnNkJYiR-nZiBeX7-G-b2kWwKds';
var supabaseClient = window.supabase.createClient(SB_URL, SB_KEY);
function togglePassword(){
  var pw=document.getElementById('password');
  pw.type = pw.type==='password' ? 'text' : 'password';
}
var isSignup = false;
function toggleMode(){
  isSignup=!isSignup;
  document.getElementById('formTitle').textContent=isSignup?'Sign Up':'Log In';
  document.getElementById('actionButton').textContent=isSignup?'Sign Up':'Log In';
  document.querySelector('.toggle').textContent=isSignup?'Already have an account? Log in':'Don\'t have an account? Sign up';
  document.getElementById('message').textContent='';
  document.getElementById('fullName').style.display=isSignup?'block':'none';
}
async function handleAuth(){
  var fullName=document.getElementById('fullName').value;
  var email=document.getElementById('email').value;
  var password=document.getElementById('password').value;
  var messageEl=document.getElementById('message');
  messageEl.textContent='';
  if(!email||!password){messageEl.textContent='Please enter both email and password.';return;}
  if(isSignup&&!fullName){messageEl.textContent='Please enter your name.';return;}
  try{
    var result;
    if(isSignup){
  result=await supabaseClient.auth.signUp({
    email:email,
    password:password,
    options:{ data:{ full_name:fullName } }
  });
}else{
  result=await supabaseClient.auth.signInWithPassword({email:email,password:password});
  if(!result.error&&result.data.user){
    var meta = result.data.user.user_metadata || {};
    await supabaseClient.from('profiles').upsert({
      id: result.data.user.id,
      email: result.data.user.email,
      full_name: meta.full_name || null
    });
  }
}
    if(result.error){messageEl.textContent=result.error.message;return;}
    if(isSignup){
      messageEl.style.color='#2d6a4f';
      messageEl.textContent='Account created! Check your email to confirm, then log in.';
    }else{
      window.location.href='index.html';
    }
  }catch(err){
    messageEl.textContent='Error: '+err.message;
  }
}
</script>
</body>
</html>
